  <line x1="24" y1="13" x2="23" y2="19" stroke="#3a1c08" stroke-width="0.8"/>
  <line x1="28" y1="16" x2="27" y2="20" stroke="#3a1c08" stroke-width="0.8"/>
  <!-- Body -->
  <ellipse cx="20" cy="34" rx="13" ry="14" fill="url(#acornBody)"/>
