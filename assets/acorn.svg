      <stop offset="0%" stop-color="#FFD23F"/>
      <stop offset="60%" stop-color="#E87722"/>
      <stop offset="100%" stop-color="#9b4a14"/>
    </linearGradient>
    <linearGradient id="acornCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3a10"/>
