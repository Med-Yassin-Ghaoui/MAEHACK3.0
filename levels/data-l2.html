<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>L2 · Comparer deux périodes · Questify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/design.css"/>
  <style>
    .layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 28px;
      align-items: start;
    }
    .chart-card {
      background: var(--color-surface-card);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: 0 1px 3px rgba(92,44,14,0.04);
    }
    .chart-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .legend {
      display: flex; gap: 14px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .legend-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .chart-svg { width: 100%; display: block; }
    .grid-line { stroke: var(--color-border-tertiary); stroke-width: 0.5; stroke-dasharray: 2,2; }
    .axis-line { stroke: var(--color-border-tertiary); stroke-width: 0.5; }
    .axis-label { font-size: 11px; fill: var(--color-text-secondary); font-weight: 500; }
    .value-label { font-size: 10px; fill: var(--color-brown); font-weight: 600; }
    .bar-jan { fill: var(--color-text-info); transition: opacity 200ms; }
    .bar-fev { fill: var(--color-accent); transition: opacity 200ms; }
    .bar-jan:hover, .bar-fev:hover { opacity: 0.75; }

    .insight-banner {
      margin-top: 16px;
      padding: 14px 18px;
      background: var(--color-background-info);
      color: var(--color-text-info);
      border-radius: var(--radius);
      font-size: 14px;
      display: none;
    }
    .insight-banner.show { display: block; animation: animateIn 350ms; }
    .insight-banner strong { display: block; margin-bottom: 4px; }

    .qcard {
      background: var(--color-surface-card);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: 0 1px 3px rgba(92,44,14,0.04);
    }
    .qheader {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .qbadge {
      font-size: 12px; font-weight: 600;
      color: var(--color-text-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .qtext {
      font-size: 16px; font-weight: 600;
      color: var(--color-heading);
      margin-bottom: 14px;
    }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice {
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 0.5px solid var(--color-border-tertiary);
      background: var(--color-surface-card);
      cursor: pointer;
      transition: all 180ms;
      text-align: left;
      font: inherit;
      color: var(--color-brown);
      font-weight: 500;
    }
    .choice:hover:not(.locked) { transform: translateY(-1px); border-color: var(--color-border-secondary); }
    .choice.correct { background: var(--color-background-success); border-color: var(--color-text-success); color: var(--color-text-success); }
    .choice.wrong { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
    .choice.locked { cursor: default; }
    .explain {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--color-background-info);
      color: var(--color-text-info);
      border-radius: var(--radius);
      font-size: 14px;
      display: none;
    }
    .explain.show { display: block; animation: animateIn 300ms; }
    .next-row { margin-top: 16px; display: flex; justify-content: flex-end; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="animate-in" style="margin-bottom: 24px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="badge badge-data" id="lvl-badge">Niveau 2</span>
        <span class="muted" style="font-size:14px;">Data · Comparer deux mois</span>
      </div>
      <h1 class="h1" style="margin-top: 12px;">Janvier vs Février</h1>
    </header>

    <section class="layout">
      <div class="chart-card animate-in" style="--i:1;">
        <div class="chart-header">
          <h3 class="h3">Volume de ventes (unités)</h3>
          <div class="legend">
            <span><span class="legend-dot" style="background:var(--color-text-info);"></span>Janvier</span>
            <span><span class="legend-dot" style="background:var(--color-accent);"></span>Février</span>
          </div>
        </div>
        <svg class="chart-svg" id="chart" viewBox="0 0 560 380"></svg>

        <div class="insight-banner" id="insight">
          <strong id="insight-title">Cas contre-intuitif</strong>
          <span id="insight-text"></span>
        </div>
      </div>

      <div>
        <div class="qcard animate-in" style="--i:2;">
          <div class="qheader">
            <span class="qbadge">Question <span id="qnum">1</span> / <span id="qtot">4</span></span>
            <span class="qbadge" id="score-tag">0 / 4</span>
          </div>
          <p class="qtext" id="qtext"></p>
          <div class="choices" id="choices"></div>
          <div class="explain" id="explain"></div>
          <div class="next-row">
            <button class="btn btn-primary" id="next-btn" style="display:none;">Suivant →</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../scripts/data.js"></script>
  <script src="../scripts/app.js"></script>
  <script>
    const LEVEL_ID = 'data-l2';
    const data = LEVELS[LEVEL_ID];

    App.renderTopbar({ back: '../paths/data.html', title: 'Niveau 2 · Comparer', progressTarget: 0.2 });
    App.injectMascot('../');
    document.getElementById('lvl-badge').innerHTML = App.icon('chart', 14) + ' Niveau 2';

    document.getElementById('qtot').textContent = data.questions.length;

    // ---------- Chart ----------
    function drawChart() {
      const svg = document.getElementById('chart');
      const W = 560, H = 380, padL = 130, padR = 30, padT = 20, padB = 40;
      const max = Math.max(...data.donnees.flatMap(d => [d.janv, d.fevr]));
      const niceMax = Math.ceil(max / 50) * 50;
      const groupH = (H - padT - padB) / data.donnees.length;
      const chartW = W - padL - padR;

      let html = '';
      for (let i = 0; i <= 4; i++) {
        const x = padL + (i / 4) * chartW;
        html += `<line class="grid-line" x1="${x}" y1="${padT}" x2="${x}" y2="${H - padB}"/>`;
        html += `<text class="axis-label" x="${x}" y="${H - padB + 14}" text-anchor="middle">${Math.round((i/4) * niceMax)}</text>`;
      }
      data.donnees.forEach((d, i) => {
        const yGroup = padT + i * groupH + 4;
        const subH = (groupH - 12) / 2;
        const lenJan = (d.janv / niceMax) * chartW;
        const lenFev = (d.fevr / niceMax) * chartW;
        html += `<text class="axis-label" x="${padL - 8}" y="${yGroup + groupH/2 - 2}" text-anchor="end">${d.produit}</text>`;
        html += `<rect class="bar-jan" x="${padL}" y="${yGroup}" width="0" height="${subH}" rx="2">
          <animate attributeName="width" from="0" to="${lenJan}" dur="0.5s" fill="freeze" begin="${i*0.06}s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
        </rect>`;
        html += `<text class="value-label" x="${padL + lenJan + 4}" y="${yGroup + subH/2 + 4}">${d.janv}</text>`;
        html += `<rect class="bar-fev" x="${padL}" y="${yGroup + subH + 2}" width="0" height="${subH}" rx="2">
          <animate attributeName="width" from="0" to="${lenFev}" dur="0.5s" fill="freeze" begin="${i*0.06 + 0.1}s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
        </rect>`;
        html += `<text class="value-label" x="${padL + lenFev + 4}" y="${yGroup + subH + 2 + subH/2 + 4}">${d.fevr}</text>`;
      });
      html += `<line class="axis-line" x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}"/>`;
      svg.innerHTML = html;
    }
    drawChart();

    // ---------- Quiz ----------
    let qIdx = 0, score = 0, locked = false;
    function renderQ() {
      const q = data.questions[qIdx];
      document.getElementById('qnum').textContent = qIdx + 1;
      document.getElementById('explain').classList.remove('show');
      document.getElementById('next-btn').style.display = 'none';
      const wrap = document.getElementById('choices');
      wrap.innerHTML = '';
      document.getElementById('qtext').textContent = q.enonce;
      locked = false;
      q.choix.forEach(c => {
        const b = document.createElement('button');
        b.className = 'choice';
        b.textContent = c;
        b.addEventListener('click', () => answer(b, c, q));
        wrap.appendChild(b);
      });
    }

    function answer(btn, choice, q) {
      if (locked) return;
      locked = true;
      const correct = choice === q.reponseCorrecte || choice == q.reponseCorrecte;
      document.querySelectorAll('.choice').forEach(b => {
        b.classList.add('locked');
        if (b.textContent == q.reponseCorrecte) b.classList.add('correct');
      });
      if (correct) {
        btn.classList.add('correct');
        App.celebrateElement(btn);
        score++;
        App.addXP(3);
      } else {
        btn.classList.add('wrong');
        App.shakeElement(btn);
      }
      const expl = document.getElementById('explain');
      expl.textContent = q.explication;
      expl.classList.add('show');
      document.getElementById('score-tag').textContent = `${score} / ${data.questions.length}`;
      document.getElementById('next-btn').style.display = '';
      // Trigger insight banner on last question (the counter-intuitive one)
      if (qIdx === data.questions.length - 1) {
        document.getElementById('insight-title').innerHTML = App.icon('bulb', 14) + ` Cas contre-intuitif : ${data.casContreIntuitif.produit}`;
        document.getElementById('insight-text').textContent = data.casContreIntuitif.explication;
        document.getElementById('insight').classList.add('show');
      }
    }

    document.getElementById('next-btn').addEventListener('click', () => {
      qIdx++;
      if (qIdx >= data.questions.length) finish();
      else renderQ();
    });

    function finish() {
      const stars = score === data.questions.length ? 3 : (score >= 3 ? 2 : 1);
      const bonus = score === data.questions.length ? 8 : 0;
      App.showLevelComplete({
        levelId: LEVEL_ID,
        xpEarned: bonus,
        stars,
        insight: "Comparer deux périodes, c'est plus puissant que regarder un mois isolé — les tendances racontent une histoire que les chiffres seuls ne disent pas.",
        nextHref: '../paths/data.html',
      });
    }

    renderQ();
  </script>
</body>
</html>
